background {
    monitor = DP-2
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.15
}

# Time -- all monitors
label {
    monitor =
    text = $TIME
    color = rgba(212, 190, 152, 0.90)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 180
    halign = center
    valign = center
}

# Date -- all monitors
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %d %B %Y"
    color = rgba(199, 171, 122, 0.80)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 110
    halign = center
    valign = center
}

# Password input -- primary monitor only
input-field {
    monitor = DP-2
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.14)
    inner_color = rgba(12, 14, 20, 0.80)
    font_color = rgba(212, 190, 152, 0.90)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 10
    check_color = rgba(169, 182, 101, 0.95)
    fail_color = rgba(193, 74, 74, 1.0)
    fail_text = <i>$FAIL</i>
    position = 0, -20
    halign = center
    valign = center
}
